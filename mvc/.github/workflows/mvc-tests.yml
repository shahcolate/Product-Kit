name: MVC Contract and Behavioral Tests

on:
  pull_request:
    branches: [main]

jobs:
  mvc-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run MVC tests
        working-directory: mvc/demo
        run: python mvc_test_runner.py --mvc context/mvc.yaml
