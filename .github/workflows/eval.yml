name: Behavioral Eval

on:
  workflow_dispatch:
    inputs:
      plugin:
        description: "Plugin to evaluate (leave empty for all)"
        required: false
        default: ""
      model:
        description: "Claude model"
        required: false
        default: "claude-opus-4-6"
      baseline:
        description: "Run baseline comparison (skill vs vanilla Claude)"
        required: false
        type: boolean
        default: false

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install anthropic
      - name: Run evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          PLUGIN_ARG=""
          if [ -n "${{ inputs.plugin }}" ]; then PLUGIN_ARG="--plugin ${{ inputs.plugin }}"; fi
          BASELINE_ARG=""
          if [ "${{ inputs.baseline }}" = "true" ]; then BASELINE_ARG="--baseline"; fi
          python scripts/run_evals.py $PLUGIN_ARG --model "${{ inputs.model }}" $BASELINE_ARG
