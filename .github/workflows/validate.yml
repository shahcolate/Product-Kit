name: Validate

on:
  pull_request:
    branches: [main]

jobs:
  lint-json:
    name: Lint JSON files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          find . -name "*.json" -not -path "./.git/*" | while read file; do
            echo "Checking $file"
            python3 -m json.tool "$file" > /dev/null || { echo "INVALID JSON: $file"; exit 1; }
          done
          echo "All JSON files are valid."

  validate-plugin-manifests:
    name: Validate plugin manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check plugin.json files have required fields
        run: |
          find plugins -name "plugin.json" | while read file; do
            echo "Checking $file"
            name=$(python3 -c "import json,sys; d=json.load(open('$file')); print(d.get('name',''))")
            version=$(python3 -c "import json,sys; d=json.load(open('$file')); print(d.get('version',''))")
            skills=$(python3 -c "import json,sys; d=json.load(open('$file')); print(len(d.get('skills',[])))")
            if [ -z "$name" ] || [ -z "$version" ] || [ "$skills" -eq 0 ]; then
              echo "ERROR: $file is missing required fields (name, version, skills)"
              exit 1
            fi
            echo "  name=$name version=$version skills=$skills OK"
          done

  validate-skill-files:
    name: Validate SKILL.md files exist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check each plugin.json skill path resolves to an existing SKILL.md
        run: |
          find plugins -name "plugin.json" | while read manifest; do
            dir=$(dirname "$manifest")
            python3 - <<EOF
          import json, os, sys
          manifest = "$manifest"
          base_dir = "$dir"
          with open(manifest) as f:
              d = json.load(f)
          for skill in d.get("skills", []):
              path = skill.get("path", "")
              full = os.path.normpath(os.path.join(base_dir, path))
              if not os.path.exists(full):
                  print(f"ERROR: skill path not found: {full}")
                  sys.exit(1)
              print(f"  OK: {full}")
          EOF
          done
