name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    name: Build plugin ZIPs and publish release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build plugin ZIPs
        run: |
          mkdir -p dist
          for plugin_dir in plugins/*/; do
            plugin_name=$(basename "$plugin_dir")
            zip_name="${plugin_name}-${GITHUB_REF_NAME}.zip"
            echo "Packaging $plugin_name → dist/$zip_name"
            (cd plugins && zip -r "../dist/$zip_name" "$plugin_name")
          done
          ls -lh dist/

      - name: Copy ZIPs to releases/
        run: |
          mkdir -p releases
          cp dist/*.zip releases/

      - name: Extract release notes from CHANGELOG.md
        id: changelog
        run: |
          # Extract notes for the current version from CHANGELOG.md
          version="${{ steps.version.outputs.version }}"
          notes=$(awk "/^## \[$version\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$notes" ]; then
            notes="See CHANGELOG.md for details."
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$notes" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "ProductKit ${{ github.ref_name }}"
          body: ${{ steps.changelog.outputs.notes }}
          files: dist/*.zip
          draft: false
          prerelease: false
